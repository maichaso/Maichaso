<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ちゃそてぃあ｜ファンテア[fantea]</title>
  <style>
    body {
      position: relative;
      overflow: hidden;
      height: 100dvh;
      text-align: center;
      background-color: white;
      color: black;
      font-family: Arial;
      margin-top: 0%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    #sub {
      font-size: 18px;
      color: gray;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
    }

    #btn {
      font-size: 18px;
      padding: 10px 20px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    video {
     display: none;
     position: fixed;
     top: 0;
     left: 0;
     width: 100vw;
     height: 100dvh;
     object-fit: cover;
     z-index: 0;
    }

    .spawn-img {
     position: fixed;
     width: 100vmin;
     height: auto;
     pointer-events: none;
     z-index: 10;
    }
    
  </style>
</head>

<body>

<img src="kusari.png">

<p id="sub">https://fantea.jp/maichaso/1218</p>
<h1>外部サイトを開こうとしています。</h1>
<button id="btn">開く</button>

<video id="video" src="ero.mp4" autoplay muted playsinline loop></video>

<script>
  let positions = [];

  function isTooClose(x, y) {
  for (let p of positions) {
    const dx = p.x - x;
    const dy = p.y - y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 150) return true;
  }
  return false;
}

  function createImage(x, y) {
  const img = document.createElement("img");
  img.src = "miserarenntyaso.png";
  img.className = "spawn-img";

  const vw = window.innerWidth;
  const size = vw * 0.3;

  img.style.left = x + "px";
  img.style.top = y + "px";

  document.body.appendChild(img);
}

  const btn = document.getElementById("btn");
  const video = document.getElementById("video");

  let clickCount = 0;

  btn.onclick = () => {
    btn.style.display = "none";
    document.querySelector("img").style.display = "none";
    document.querySelector("h1").style.display = "none";
    document.getElementById("sub").style.display = "none";
    video.style.display = "block";
    video.play();

 const size = window.innerWidth < 600 ? 150 : 600;

 
  };


document.body.addEventListener("click", (e) => {
  if (video.style.display === "block") {

    if (e.target.id === "btn") return;

    clickCount++;

   const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
   const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;

   const base = Math.min(vw, vh);

   const size = base * 1;
   const margin = base * 0.05;
   const avoid = base * 0.15;

   let x, y;

  do {
     x = Math.random() * (vw - size - margin * 2) + margin;
     y = Math.random() * (vh - size - margin * 2) + margin;
    } while (
    x > vw / 2 - avoid &&
    x < vw / 2 + avoid &&
    y > vh / 2 - avoid &&
    y < vh / 2 + avoid 
    );

     createImage(x, y);
     positions.push({ x, y });

     if (clickCount >= 10) {
       window.location.href = "https://youtu.be/IV1LNAZp-Cg";
      }
  }
});


</script>

</body>
</html>
